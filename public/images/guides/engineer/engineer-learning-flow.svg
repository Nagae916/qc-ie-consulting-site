<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">技術士 経営工学部門の学習フロー</title>
  <desc id="desc">過去問分析から答案作成までの6ステップを示す図</desc>
  <rect width="960" height="360" rx="24" fill="#f8fbff"/>
  <text x="48" y="50" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#0f2742">技術士 経営工学 学習フロー</text>
  <text x="48" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#526475">過去問から始め、キーワードを答案へ配置する</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(44 118)">
      <rect width="126" height="120" rx="16" fill="#ffffff" stroke="#b9cde2"/>
      <circle cx="30" cy="30" r="18" fill="#0f3a5f"/><text x="24" y="37" font-size="18" font-weight="700" fill="#fff">1</text>
      <text x="20" y="68" font-size="15" font-weight="700" fill="#0f2742">過去問</text><text x="20" y="91" font-size="13" fill="#526475">トレンドを見る</text>
    </g>
    <path d="M178 178h40" stroke="#8aa9c5" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(226 118)">
      <rect width="126" height="120" rx="16" fill="#ffffff" stroke="#b9cde2"/>
      <circle cx="30" cy="30" r="18" fill="#0f3a5f"/><text x="24" y="37" font-size="18" font-weight="700" fill="#fff">2</text>
      <text x="20" y="68" font-size="15" font-weight="700" fill="#0f2742">設問形式</text><text x="20" y="91" font-size="13" fill="#526475">問われ方を知る</text>
    </g>
    <path d="M360 178h40" stroke="#8aa9c5" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(408 118)">
      <rect width="126" height="120" rx="16" fill="#fff7e6" stroke="#e3ba72"/>
      <circle cx="30" cy="30" r="18" fill="#b7791f"/><text x="24" y="37" font-size="18" font-weight="700" fill="#fff">3</text>
      <text x="20" y="68" font-size="15" font-weight="700" fill="#0f2742">重要語</text><text x="20" y="91" font-size="13" fill="#526475">100語を学ぶ</text>
    </g>
    <path d="M542 178h40" stroke="#8aa9c5" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(590 118)">
      <rect width="126" height="120" rx="16" fill="#ffffff" stroke="#b9cde2"/>
      <circle cx="30" cy="30" r="18" fill="#0f3a5f"/><text x="24" y="37" font-size="18" font-weight="700" fill="#fff">4</text>
      <text x="20" y="68" font-size="15" font-weight="700" fill="#0f2742">用途整理</text><text x="20" y="91" font-size="13" fill="#526475">テーマ別に見る</text>
    </g>
    <path d="M724 178h40" stroke="#8aa9c5" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(772 118)">
      <rect width="126" height="120" rx="16" fill="#ffffff" stroke="#b9cde2"/>
      <circle cx="30" cy="30" r="18" fill="#0f3a5f"/><text x="24" y="37" font-size="18" font-weight="700" fill="#fff">5</text>
      <text x="20" y="68" font-size="15" font-weight="700" fill="#0f2742">答案骨子</text><text x="20" y="91" font-size="13" fill="#526475">型に配置する</text>
    </g>
    <rect x="280" y="282" width="400" height="42" rx="21" fill="#0f3a5f"/>
    <text x="346" y="309" font-size="16" font-weight="700" fill="#fff">STEP 6　600字・1600字答案へ展開</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#8aa9c5"/></marker></defs>
</svg>
